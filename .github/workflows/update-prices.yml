name: Update CS2 Prices

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Debug - show runner IP and DNS test
        run: |
          echo "=== Runner IP ==="
          curl -s https://httpbin.org/ip || echo "curl failed"
          echo ""
          echo "=== DNS test for open.steampdt.com ==="
          nslookup open.steampdt.com || echo "nslookup failed"
          echo ""
          echo "=== DNS test for api.steampdt.com ==="
          nslookup api.steampdt.com || echo "nslookup failed"
          echo ""
          echo "=== curl SteamDT API ==="
          curl -v --max-time 10 https://open.steampdt.com/ || echo "curl failed"

      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: node update.mjs

      - name: Show result
        run: |
          echo "=== market.json (first 3000 chars) ==="
          cat market.json | head -c 3000
          echo ""
          echo ""
          echo "File sizes:"
          wc -c market.json index.html


      - name: CSQAQ API Diagnostic
        run: |
          echo "=== CSQAQ IP Whitelist Test ===" >> $GITHUB_ENV
          echo "=== Runner Date (UTC): $(date -u)" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "Testing CSQAQ daily endpoint..." >> $GITHUB_ENV
          HTTP_CODE=$(curl -s -o /tmp/csqaq_response.json -w "%{http_code}" --max-time 15             "https://api.csqaq.com/api/v1/sub/kline?type=1day&id=1"             -H "ApiToken: HXGPY1R7L5W7K7F3O4K1E2N8"             -H "User-Agent: GitHubActions/1.0")
          echo "HTTP Code: $HTTP_CODE" >> $GITHUB_ENV
          echo "Response (first 500 chars):" >> $GITHUB_ENV
          head -c 500 /tmp/csqaq_response.json >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "Done testing." >> $GITHUB_ENV
          # Also show in step output
          echo "CSQAQ HTTP Code: $HTTP_CODE"
          echo "CSQAQ Response preview:"
          head -c 300 /tmp/csqaq_response.json

      - name: Push via GitHub REST API

        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'PYEOF'
          import os, json, base64, urllib.request, urllib.error

          token = os.environ['GH_PAT']
          repo = 'hintime/cs2-dashboard'
          headers = {
              'Authorization': f'token {token}',
              'User-Agent': 'github-actions',
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
          }
          ssl_ctx = __import__('ssl').create_default_context()
          ssl_ctx.check_hostname = False
          ssl_ctx.verify_mode = __import__('ssl').CERT_NONE

          def get_sha(path):
              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/contents/{path}',
                  headers=headers
              )
              r = urllib.request.urlopen(req, timeout=15, context=ssl_ctx)
              return json.loads(r.read())['sha']

          def update_file(path, msg):
              try:
                  sha = get_sha(path)
                  print(f'sha for {path}: {sha[:8]}')
              except Exception as e:
                  print(f'get_sha error for {path}: {e} -- proceeding without sha')
                  sha = None
              content_bytes = open(path, 'rb').read()
              b64 = base64.b64encode(content_bytes).decode('ascii')
              body = json.dumps({'message': msg, 'content': b64, 'sha': sha}).encode()
              req = urllib.request.Request(
                  f'https://api.github.com/repos/{repo}/contents/{path}',
                  data=body,
                  headers=headers,
                  method='PUT'
              )
              try:
                  r = urllib.request.urlopen(req, timeout=15, context=ssl_ctx)
                  result = json.loads(r.read())
                  print(f'OK {path}: {result["commit"]["sha"][:8]}')
              except urllib.error.HTTPError as e:
                  err_body = e.read().decode()[:500]
                  print(f'FAIL {path}: HTTP {e.code}: {err_body}')

          ts = __import__('datetime').datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
          update_file('market.json', f'chore: Auto-update prices {ts}')
          update_file('index.html', f'chore: Update index.html {ts}')
          print('All done.')
          PYEOF
