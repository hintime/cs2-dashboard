name: Update CS2 Prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: |
          node update.mjs
      - name: Show result
        run: |
          echo "=== market.json (first 3000 chars) ==="
          head -c 3000 market.json
          echo ""
          echo "=== File size ==="
          wc -c market.json
      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add market.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'chore: Auto-update prices and K-line from SteamDT'
            git push origin HEAD:main
          fi
