name: Update CS2 Prices

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: node update.mjs

      - name: Show result
        run: |
          echo "=== market.json (first 2000 chars) ==="
          head -c 2000 market.json
          echo ""
          echo "=== File sizes ==="
          wc -c market.json index.html

      - name: Commit & Push via gh API
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Use gh CLI (pre-installed) with PAT auth
          echo "$GH_PAT" | gh auth login --with-token

          # Configure git
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Check what changed
          CHANGED=$(git status --porcelain)
          echo "Changed files: $CHANGED"

          if [ -n "$CHANGED" ]; then
            git add market.json index.html
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: Auto-update $TIMESTAMP"
            git push
            echo "Push done!"
          else
            echo "No changes -- skipped"
          fi
