name: Update CS2 Data

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update data
        run: python3 .github/update_data.py
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
