name: Update CS2 Prices

on:
  schedule:
    # Every hour at UTC :00 ( Beijing 08:00 — update at market open)
    - cron: '0 * * * *'
    # Every day at Beijing 00:00 (UTC 16:00) — force update regardless of price change
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: node update.mjs
      - name: Show result
        run: |
          echo "=== market.json (first 3000 chars) ==="
          head -c 3000 market.json
          echo ""
          echo "=== File size ==="
          wc -c market.json
      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add market.json
          if ! git diff --cached --quiet; then
            git commit -m 'chore: Auto-update prices and K-line $(date -u +"%Y-%m-%d %H:%M UTC")'
            git pull --rebase origin main || true
            git push origin HEAD:main
          else
            echo "No price change — skipped"
          fi
