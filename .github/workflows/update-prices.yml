name: Update CS2 Prices

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node update.mjs

      - name: Show result
        run: |
          echo '```json'
          cat market.json
          echo ''
          echo '```'

      - name: Network Diagnostics
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: |
          {
            echo '## CI Network Test Results'
            echo ''
            echo '### Runner Info'
            echo '- Date (UTC): '$(date -u)
            echo '- Runner IP test:'
            curl -s --max-time 5 https://httpbin.org/ip || echo "(failed)"
            echo ''
            echo '### SteamDT root test'
            curl -s -o /dev/null -w 'HTTP:%{http_code}' --max-time 10 https://open.steampdt.com/ || echo "(failed)"
            echo ''
            echo '### SteamDT K-line API'
            curl -s --max-time 15 -X POST https://open.steampdt.com/open/cs2/item/v1/kline \
              -H 'Content-Type: application/json' \
              -H 'Authorization: Bearer '"$STEAMDT_KEY" \
              -d '{"marketHashName":"AK-47 | Redline (Field-Tested)","type":2,"platform":"BUFF"}'
            echo ''
            echo '### CSQAQ API'
            curl -s --max-time 10 'https://api.csqaq.com/api/v1/sub/kline?type=1day&id=1' \
              -H 'ApiToken: HXGPY1R7L5W7K7F3O4K1E2N8'
          } > diagnostics.txt

      - name: Write Summary
        run: |
          if [ -f diagnostics.txt ]; then
            cp diagnostics.txt "$GITHUB_STEP_SUMMARY"
          fi

      - name: Push via Python
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 - << 'PYEOF'
import base64, urllib.request, json, ssl, os, datetime

token = os.environ['GH_PAT']
repo = 'hintime/cs2-dashboard'
hdr = {'Authorization': 'token ' + token, 'User-Agent': 'gh-actions', 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'}
sc = ssl.create_default_context(); sc.check_hostname=False; sc.verify_mode=ssl.CERT_NONE

def get_sha(path):
    req = urllib.request.Request('https://api.github.com/repos/' + repo + '/contents/' + path, headers=hdr)
    r = urllib.request.urlopen(req, timeout=15, context=sc)
    return json.loads(r.read())['sha']

def put(path, data_str, msg):
    try: sha = get_sha(path)
    except: sha = None
    b64 = base64.b64encode(data_str.encode()).decode('ascii')
    body = json.dumps({'message': msg, 'content': b64, 'sha': sha}).encode()
    req = urllib.request.Request('https://api.github.com/repos/' + repo + '/contents/' + path, data=body, headers=hdr, method='PUT')
    try:
        r = urllib.request.urlopen(req, timeout=15, context=sc)
        result = json.loads(r.read())
        print('OK ' + path + ': ' + result['commit']['sha'][:8])
    except urllib.error.HTTPError as e:
        print('FAIL ' + path + ': ' + str(e.code) + ': ' + e.read().decode()[:200])

ts = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
put('market.json', open('market.json', 'r', errors='replace').read(), 'chore: Auto-update prices ' + ts)
diag = open('diagnostics.txt', 'r', errors='replace').read() if os.path.exists('diagnostics.txt') else ''
if diag:
    put('diagnostics.txt', diag, 'chore: CI network diagnostics')
print('Done.')
PYEOF
