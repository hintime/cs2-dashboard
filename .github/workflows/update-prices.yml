name: Update CS2 Data

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update data (Node.js K-lines + Python alerts)
        run: |
          echo "=== Step 1: Node.js K-lines ==="
          node update.mjs || echo "Node failed (continuing)"

          echo "=== Step 2: Python alerts (stdlib urllib) ==="
          python3 << 'PYEOF'
import os, json, time, base64, urllib.request, ssl
from datetime import datetime as dt, timezone

CSQ_KEY = "HXGPY1R7L5W7K7F3O4K1E2N8"
CSQ_BASE = "https://api.csqaq.com/api/v1"
GH_TOKEN = os.environ.get("GITHUB_TOKEN", "")
REPO = "hintime/cs2-dashboard"
API = "https://api.github.com/repos/" + REPO + "/contents/market.json"

ctx = ssl.create_default_context()
ctx.check_hostname = False
ctx.verify_mode = ssl.CERT_NONE

def log(m):
    print("[" + dt.now().strftime("%H:%M:%S") + "] " + str(m), flush=True)

def post(url, body, headers=None):
    data = json.dumps(body).encode("utf-8")
    h = {"Content-Type": "application/json"}
    if headers:
        h.update(headers)
    req = urllib.request.Request(url, data=data, headers=h, method="POST")
    with urllib.request.urlopen(req, context=ctx, timeout=15) as r:
        return r.read()

log("Fetching CSQAQ alerts...")
all_items = {}
for page in range(1, 5):
    try:
        raw = post(CSQ_BASE + "/info/get_rank_list",
            {"page_index": page, "page_size": 50,
             "filter": {"type": ["sticker", "normal"], "sort": ["price_up_1d"]},
             "show_recently_price": True},
            {"ApiToken": CSQ_KEY})
        try:
            text = raw.decode("gbk")
        except:
            text = raw.decode("utf-8", errors="replace")
        d = json.loads(text)
        cnt = 0
        for item in d.get("data", {}).get("data", []):
            n = item.get("name", "").strip()
            if n and n not in all_items:
                all_items[n] = item
                cnt += 1
        log("Page " + str(page) + ": +" + str(cnt) + " unique = " + str(len(all_items)) + " total")
        time.sleep(1.2)
    except Exception as e:
        log("Error page " + str(page) + ": " + str(e))

log("Total unique items: " + str(len(all_items)))

alerts = []
for name, item in all_items.items():
    alerts.append({
        "id": item.get("id", 0),
        "name": name,
        "exterior": item.get("exterior_localized_name", ""),
        "rarity": item.get("rarity_localized_name", ""),
        "price": float(item.get("buff_sell_price") or 0),
        "rate_1": float(item.get("buff_price_chg") or 0),
        "rate_7": float(item.get("sell_price_rate_7") or 0),
        "rank_num": item.get("rank_num", 0),
        "img": item.get("img", "")
    })
alerts.sort(key=lambda x: x.get("rate_1", 0), reverse=True)

with open("market.json", "r", encoding="utf-8") as f:
    market = json.load(f)

market["alerts"] = alerts
market["alerts_updated"] = dt.now(timezone.utc).isoformat().replace("+00:00", "Z")

with open("market.json", "w", encoding="utf-8") as f:
    json.dump(market, f, ensure_ascii=False, indent=2)

log("Written: " + str(len(alerts)) + " alerts")

if GH_TOKEN:
    content = json.dumps(market, ensure_ascii=False, indent=2)
    encoded = base64.b64encode(content.encode("utf-8")).decode()
    
    sha_req = urllib.request.Request(API + "?ref=main",
        headers={"Authorization": "Bearer " + GH_TOKEN, "Accept": "application/vnd.github+json"})
    sha = None
    try:
        with urllib.request.urlopen(sha_req, context=ctx, timeout=10) as r:
            sha = json.loads(r.read().decode())["sha"]
    except Exception as e:
        log("Get SHA error: " + str(e))
    
    body = {"message": "chore: update alerts (" + dt.now().strftime("%m-%d %H:%M") + ")",
        "content": encoded, "branch": "main"}
    if sha:
        body["sha"] = sha
    
    push_req = urllib.request.Request(API, data=json.dumps(body).encode("utf-8"), method="PUT",
        headers={"Authorization": "Bearer " + GH_TOKEN, "Accept": "application/vnd.github+json",
                 "Content-Type": "application/json"})
    try:
        with urllib.request.urlopen(push_req, context=ctx, timeout=10) as r:
            result = json.loads(r.read().decode())
            log("Pushed: " + str(result.get("commit", {}).get("html_url", "")))
    except Exception as e:
        log("Push failed: " + str(e))
else:
    log("No GITHUB_TOKEN - data saved locally only")

log("Done!")
PYEOF
