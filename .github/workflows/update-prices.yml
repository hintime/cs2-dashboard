name: Update CS2 Prices

on:
  schedule:
    # Every hour at UTC :00 = Beijing 08:00 (market open)
    - cron: '0 * * * *'
    # Every day at Beijing 00:00 (UTC 16:00) — always rebuild even if no price change
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: node update.mjs

      - name: Show result
        run: |
          echo "=== market.json (first 3000 chars) ==="
          head -c 3000 market.json
          echo ""
          echo "=== File size ==="
          wc -c market.json

      - name: Bump cache-bust & touch index.html to force Pages rebuild
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const now = new Date().toISOString().replace(/[:.]/g, '-');
            // Always update cache-bust timestamps in JSON fetch calls
            let updated = html
              .replace(/fetch\('market\.json(?:\?[^']+)?'\)/g, \"fetch('market.json?v=\" + now + \"')\")
              .replace(/fetch\(\"market\.json(?:\?[^'\"]+)?\"\)/g, 'fetch(\"market.json?v=' + now + '\")')
              .replace(/fetch\('holdings\.json(?:\?[^']+)?'\)/g, \"fetch('holdings.json?v=\" + now + \"')\")
              .replace(/fetch\(\"holdings\.json(?:\?[^'\"]+)?\"\)/g, 'fetch(\"holdings.json?v=' + now + '\")');
            fs.writeFileSync('index.html', updated);
            console.log('Cache-bust updated. File size:', updated.length);
          "

      - name: Commit & Push
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # Always stage index.html (cache-bust changes) + market.json (price changes)
          git add market.json index.html

          # Commit message always includes timestamp
          MSG=\"chore: Auto-update $(date -u +'%Y-%m-%d %H:%M UTC') [cache-bust]\"

          # Check if anything actually changed
          if ! git diff --cached --quiet; then
            echo \"Changes detected — committing and pushing\"
            git commit -m \"$MSG\"
            git pull --rebase origin main || true
            git push https://x-access-token:$GH_PAT@github.com/hintime/cs2-dashboard.git HEAD:main
          else
            echo \"No price change and no index.html change — skipped\"
          fi
