name: Update CS2 Prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Fetch Prices
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: |
          node << 'NODESCRIPT'
          const https=require('https');
          const fs=require('fs');
          const d=JSON.parse(fs.readFileSync('market.json','utf8'));
          const names=Object.keys(d.items);
          const prices={};
          let done=0;
          names.forEach(n=>{
            const req=https.request({
              hostname:'open.steamdt.com',
              path:'/open/cs2/v1/price/single?marketHashName='+encodeURIComponent(n),
              headers:{'Authorization':'Bearer '+process.env.STEAMDT_KEY}
            },res=>{
              let body='';
              res.on('data',c=>body+=c);
              res.on('end',()=>{
                try{
                  const p=JSON.parse(body).data?.[0]?.sellPrice;
                  if(p!=null) prices[n]=p;
                }catch(e){}
                done++;
                if(done===names.length){
                  d.update_time=new Date().toISOString().replace('T',' ').slice(0,16);
                  names.forEach(n=>{
                    if(prices[n]!=null){
                      d.items[n].latest=prices[n];
                      const prev=d.items[n].kline[d.items[n].kline.length-1];
                      d.items[n].change=prev?(((prices[n]-prev[4])/prev[4])*100).toFixed(2)*1:0;
                    }
                  });
                  fs.writeFileSync('market.json',JSON.stringify(d,null,2));
                }
              });
            });
            req.on('error',()=>{done++});
            req.end();
          });
          NODESCRIPT
      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add market.json
          git diff --cached --quiet || git commit -m 'chore: Auto-update prices'
          git push https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/hintime/cs2-dashboard.git HEAD:main