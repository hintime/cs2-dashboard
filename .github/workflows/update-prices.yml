name: Update CS2 Data

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix SteamDT DNS
        run: echo "8.153.108.156 open.steamdt.com" | sudo tee -a /etc/hosts

      - name: Update data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python3 .github/update_data.py
