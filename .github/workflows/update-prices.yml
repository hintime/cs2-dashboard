name: Update CS2 Prices

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: |
          node << 'NODESCRIPT'
          const https=require('https');
          const fs=require('fs');
          const d=JSON.parse(fs.readFileSync('market.json','utf8'));
          const names=Object.keys(d.items);
          const prices={};
          let pending=names.length*2; // price + kline for each item
          let done=0;
          
          console.log('Fetching prices and K-line data for',names.length,'items...');
          console.log('STEAMDT_KEY set:', process.env.STEAMDT_KEY ? 'YES' : 'NO');
          
          names.forEach(n=>{
            // 1. Fetch current price
            const priceReq=https.request({
              hostname:'open.steamdt.com',
              path:'/open/cs2/v1/price/single?marketHashName='+encodeURIComponent(n),
              headers:{'Authorization':'Bearer '+process.env.STEAMDT_KEY}
            },res=>{
              let body='';
              res.on('data',c=>body+=c);
              res.on('end',()=>{
                try{
                  const p=JSON.parse(body).data?.[0]?.sellPrice;
                  console.log('[Price]', n, '->', p);
                  if(p!=null) prices[n]=p;
                }catch(e){console.log('[Price ERROR]', n, e.message);}
                checkDone();
              });
            });
            priceReq.on('error',e=>{console.log('[Price REQ ERROR]', n, e.message);checkDone();});
            priceReq.end();
            
            // 2. Fetch K-line data with volume
            const klineReq=https.request({
              hostname:'open.steamdt.com',
              path:'/open/cs2/item/v1/kline',
              method:'POST',
              headers:{
                'Authorization':'Bearer '+process.env.STEAMDT_KEY,
                'Content-Type':'application/json'
              }
            },res=>{
              let body='';
              res.on('data',c=>body+=c);
              res.on('end',()=>{
                try{
                  const resp=JSON.parse(body);
                  if(resp.success && resp.data && resp.data[0]){
                    // SteamDT K-line format: [[timestamp, open, high, low, close, volume, ...], ...]
                    const klineData=resp.data[0];
                    console.log('[K-line]', n, '->', klineData.length, 'points, last:', klineData[klineData.length-1]?.slice(0,6));
                    d.items[n].kline=klineData;
                  }else{
                    console.log('[K-line WARN]', n, 'no data or failed');
                  }
                }catch(e){console.log('[K-line ERROR]', n, e.message, body.slice(0,100));}
                checkDone();
              });
            });
            klineReq.on('error',e=>{console.log('[K-line REQ ERROR]', n, e.message);checkDone();});
            klineReq.write(JSON.stringify({marketHashName:n,type:2,platform:'BUFF'}));
            klineReq.end();
          });
          
          function checkDone(){
            done++;
            if(done===pending){
              console.log('All requests completed. Prices:', Object.keys(prices).length);
              d.update_time=new Date().toISOString().replace('T',' ').slice(0,16);
              
              // Update prices
              names.forEach(n=>{
                if(prices[n]!=null){
                  d.items[n].latest=prices[n];
                  const kline=d.items[n].kline;
                  if(kline && kline.length>0){
                    const lastKline=kline[kline.length-1];
                    const prevClose=lastKline[4]; // close price
                    d.items[n].change=((prices[n]-prevClose)/prevClose*100).toFixed(2)*1;
                  }
                }
              });
              
              // Update index (portfolio-weighted)
              // Using the first 6 items as market index
              const indexItems=names.slice(0,6);
              let totalValue=0, baseValue=0;
              indexItems.forEach(n=>{
                const item=d.items[n];
                if(item.latest && item.kline && item.kline[0]){
                  totalValue+=item.latest;
                  baseValue+=item.kline[0][1] || item.kline[0][0]; // use first open price as base
                }
              });
              if(baseValue>0){
                d.index.latest=totalValue;
                d.index.change=((totalValue-baseValue)/baseValue*100).toFixed(2)*1;
              }
              
              fs.writeFileSync('market.json',JSON.stringify(d,null,2));
              console.log('market.json updated with K-line data including volume');
            }
          }
          NODESCRIPT
      - name: Commit & Push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add market.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'chore: Auto-update prices and K-line data from SteamDT'
            git push origin HEAD:main
          fi
