name: Update CS2 Prices

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Debug - show runner IP and DNS test
        run: |
          echo "=== Runner IP ==="
          curl -s https://httpbin.org/ip || echo "curl failed"
          echo ""
          echo "=== DNS test for open.steampdt.com ==="
          nslookup open.steampdt.com || echo "nslookup failed"
          echo ""
          echo "=== DNS test for api.steampdt.com ==="
          nslookup api.steampdt.com || echo "nslookup failed"
          echo ""
          echo "=== curl SteamDT API ==="
          curl -v --max-time 10 https://open.steampdt.com/ || echo "curl failed"

      - name: Get Runner IP and test CSQAQ
        continue-on-error: true
        run: |
          echo "=== Runner Info ==="
          RUNNER_IP=$(curl -s https://httpbin.org/ip 2>/dev/null || echo "unknown")
          echo "Runner IP: $RUNNER_IP"
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_ENV
          echo ""
          echo "=== CSQAQ API Test ==="
          CSQAQ_CODE=$(curl -s -w "%{http_code}" -o /tmp/csqaq_body.txt --max-time 10 \
            "https://api.csqaq.com/api/v1/sub/kline?type=1day&id=1" \
            -H "ApiToken: HXGPY1R7L5W7K7F3O4K1E2N8" \
            -H "User-Agent: Mozilla/5.0" 2>/dev/null || echo "000")
          echo "CSQAQ HTTP Code: $CSQAQ_CODE"
          echo "csqaq_code=$CSQAQ_CODE" >> $GITHUB_ENV
          echo "CSQAQ Response (first 500 chars):"
          head -c 500 /tmp/csqaq_body.txt 2>/dev/null || echo "(no response body)"

      - name: Fetch Prices & K-line Data
        env:
          STEAMDT_KEY: ${{ secrets.STEAMDT_KEY }}
        run: node update.mjs

      - name: Show result
        run: |
          echo "=== market.json (first 3000 chars) ==="
          cat market.json | head -c 3000
          echo ""
          echo ""
          echo "File sizes:"
          wc -c market.json index.html

      - name: Push market.json to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/push_market.py
