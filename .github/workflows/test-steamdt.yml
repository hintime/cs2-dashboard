name: Test SteamDT API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Test SteamDT K-line API (Volume Check)
        run: |
          echo "=== Test 1: SteamDT HTTP connectivity ==="
          curl -s -o /dev/null -w "HTTP %{http_code}\n" https://open.steamdt.com/

          echo ""
          echo "=== Test 2: SteamDT K-line (daily) ==="
          curl -s -X POST "https://open.steamdt.com/open/cs2/v1/kline" \
            -H "Authorization: Bearer ${{ secrets.STEAMDT_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"marketHashName":"AK-47 | Redline (Field-Tested)","type":2}' \
            > /tmp/kline.json
          
          python3 -c "
import json
with open('/tmp/kline.json') as f:
    d = json.load(f)
print('success:', d.get('success'))
print('errorCode:', d.get('errorCode'))
print('errorMsg:', d.get('errorMsg'))
data = d.get('data', [])
print('data type:', type(data).__name__)
if isinstance(data, list):
    print('entries count:', len(data))
    for i, item in enumerate(data[:5]):
        print(f'  [{i}]: {item}  (len={len(item) if isinstance(item,list) else \"?\"})')
elif isinstance(data, dict):
    print('data keys:', list(data.keys())[:10])
    for k in list(data.keys())[:5]:
        print(f'  [{k}]: {data[k]}')
"
