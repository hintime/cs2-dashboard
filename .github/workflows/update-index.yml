name: Update CS2 Market Index

on:
  schedule:
    # 每小时整点运行
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pycryptodome

      - name: Run index collector
        env:
          ECO_PRIVATE_KEY_B64: ${{ secrets.ECO_PRIVATE_KEY_B64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python index_collector.py

      - name: Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_history/ index_history/ market.json
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: market index $(date +'%Y-%m-%d %H:00')" && \
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
