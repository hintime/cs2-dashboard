name: Update CS2 Market Index

on:
  schedule:
    # 每小时整点运行
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pycryptodome

      - name: Run index collector
        env:
          ECO_PRIVATE_KEY_B64: ${{ secrets.ECO_PRIVATE_KEY_B64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== START ==="
          timeout 120 python index_collector.py 2>&1 || echo "EXIT_CODE=$?"
          echo "=== END ==="

      - name: Debug git state
        run: |
          echo "=== git status ==="
          git status --short
          echo "=== git log -1 --oneline ==="
          git log -1 --oneline
          echo "=== git remote -v ==="
          git remote -v
          echo "=== git diff --stat ==="
          git diff --stat
          echo "=== git diff --cached --stat ==="
          git diff --cached --stat

      - name: Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_history/ index_history/ market.json
          # Always commit (even if no change) to update GitHub Pages timestamp
          git commit -m "chore: market index $(date +'%Y-%m-%d %H:00')" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
