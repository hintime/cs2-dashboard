name: Debug Network

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug Network Info
        run: |
          echo "=== Runner IP ===" > debug.txt
          curl -s https://httpbin.org/ip >> debug.txt 2>&1
          echo "" >> debug.txt
          echo "=== DNS lookup ===" >> debug.txt
          nslookup open.steampdt.com >> debug.txt 2>&1 || echo "nslookup failed" >> debug.txt
          echo "" >> debug.txt
          echo "=== curl SteamDT root ===" >> debug.txt
          curl -v --max-time 10 https://open.steampdt.com/ >> debug.txt 2>&1 || true
          echo "" >> debug.txt
          echo "=== curl httpbin ===" >> debug.txt
          curl -s --max-time 5 https://httpbin.org/get >> debug.txt 2>&1 || echo "failed" >> debug.txt
          echo "" >> debug.txt
          echo "=== DNS for other domains ===" >> debug.txt
          nslookup api.steampdt.com >> debug.txt 2>&1 || echo "failed" >> debug.txt
          echo "=== ping test ===" >> debug.txt
          ping -c 1 8.8.8.8 >> debug.txt 2>&1 || echo "ping failed" >> debug.txt
          echo "Done." >> debug.txt
          cat debug.txt

      - name: Push debug via Python
        run: |
          python3 - << 'PYEOF'
import base64, urllib.request, json, ssl, os, datetime

token = os.environ['GH_PAT']
repo = 'hintime/cs2-dashboard'
h = {'Authorization': 'token ' + token, 'User-Agent': 'github-actions', 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'}
sc = ssl.create_default_context(); sc.check_hostname=False; sc.verify_mode=ssl.CERT_NONE

def get_sha(path):
    req = urllib.request.Request('https://api.github.com/repos/' + repo + '/contents/' + path, headers=h)
    r = urllib.request.urlopen(req, timeout=15, context=sc)
    return json.loads(r.read())['sha']

def put_file(path, content_str, msg):
    try:
        sha = get_sha(path)
    except:
        sha = None
    b64 = base64.b64encode(content_str.encode()).decode('ascii')
    body = json.dumps({'message': msg, 'content': b64, 'sha': sha}).encode()
    req = urllib.request.Request('https://api.github.com/repos/' + repo + '/contents/' + path, data=body, headers=h, method='PUT')
    try:
        r = urllib.request.urlopen(req, timeout=15, context=sc)
        result = json.loads(r.read())
        print('OK ' + path + ': ' + result['commit']['sha'][:8])
    except urllib.error.HTTPError as e:
        print('FAIL ' + path + ': HTTP ' + str(e.code) + ': ' + e.read().decode()[:200])

debug_content = open('debug.txt', 'r', errors='replace').read()
ts = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
put_file('debug.txt', debug_content, 'chore: debug run ' + ts)
PYEOF

        env:
          GH_PAT: ${{ secrets.GH_PAT }}
