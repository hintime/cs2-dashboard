<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>CS2 饰品投资看板 · v2026.04.11</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;--border:#252a36;--text:#e4e4e7;--text2:#a1a1aa;--text3:#52525b;--rise:#ef4444;--fall:#22c55e;--blue:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1280px;margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:900}
.header .sub{font-size:12px;color:var(--text3);margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px}
.badge .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.market-index{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
.mi-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mi-title{font-size:14px;font-weight:800}
.mi-num{font-size:32px;font-weight:900;font-family:'DM Mono',monospace}
.mi-chg{font-size:14px;font-weight:700;font-family:'DM Mono',monospace}
.mi-chart{height:180px;margin-bottom:14px}
.mi-items{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.mi-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:border-color .2s}
.mi-item:hover,.mi-item.active{border-color:var(--blue)}
.mi-item-name{font-size:10px;color:var(--text3);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-item-price{font-size:13px;font-weight:700}
.mi-item-chg{font-size:10px;margin-top:2px}
.clr-up{color:var(--rise)}.clr-dn{color:var(--fall)}

.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px}
.kpi{background:var(--surface);padding:20px}
.kpi .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.kpi .value{font-size:26px;font-weight:900}
.kpi .value.rise{color:var(--rise)}.kpi .value.fall{color:var(--fall)}
.kpi .meta{font-size:11px;color:var(--text3);margin-top:6px}

.sectors{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.sector{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.sector .head{display:flex;justify-content:space-between;margin-bottom:10px}
.sector .name{font-size:12px;font-weight:700;color:var(--text2)}
.sector .count{font-size:10px;color:var(--text3)}
.sector .pnl{font-size:18px;font-weight:900;margin-top:8px}
.sector .detail{font-size:10px;color:var(--text3);margin-top:4px}
.sector .bar{height:3px;background:var(--surface2);border-radius:2px;margin-top:8px;overflow:hidden}
.sector .bar-fill{height:100%;border-radius:2px}
.bar-rise{background:var(--rise)}.bar-fall{background:var(--fall)}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.panel-head h2{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.5px}
.tabs{display:flex;gap:4px}
.tab{background:none;border:1px solid transparent;color:var(--text3);padding:4px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--blue);background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.2)}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;padding:10px 16px;background:var(--surface);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border)}
tbody td{padding:10px 16px;border-bottom:1px solid rgba(37,42,54,.5);font-size:13px}
tbody tr:hover{background:rgba(59,130,246,.03)}
.item-name{font-weight:600}
.item-sub{font-size:10px;color:var(--text3);margin-top:2px}
.wear-tag{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:4px;margin-left:6px;font-family:'DM Mono',monospace}
.text-r{text-align:right}
.clr-rise{color:var(--rise)}.clr-fall{color:var(--fall)}.mono{font-family:'DM Mono',monospace}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-box h3{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:16px}
.chart-box.wide{grid-column:span 2}

.foot{font-size:10px;color:var(--text3);text-align:center;padding:20px}
.refresh-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:6px 16px;border-radius:20px;cursor:pointer}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>CS2 饰品投资看板 <span style="font-size:14px;color:var(--text3)">v2026.04.11</span></h1>
      <div class="sub">数据来源: SteamDT API · GitHub Pages</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="refresh-btn" onclick="location.reload()">刷新</button>
      <span class="badge"><span class="dot"></span>实时</span>
      <span class="badge" id="updateTime">--</span>
    </div>
  </div>

  <!-- Market Index -->
  <div class="market-index" id="marketSection">
    <div class="mi-header">
      <span class="mi-title">CS2 大盘指数</span>
      <div id="miValue"><span class="mi-num" id="miNum">--</span><span class="mi-chg" id="miChg">--</span></div>
    </div>
    <div class="mi-chart" id="indexChart"></div>
    <div class="mi-items" id="miItems"></div>
  </div>

  <!-- KPI -->
  <div class="kpi-strip">
    <div class="kpi"><div class="label">总价值</div><div class="value" id="totalValue">--</div><div class="meta" id="totalCount">-- 件</div></div>
    <div class="kpi"><div class="label">总盈亏</div><div class="value" id="totalPnl">--</div><div class="meta" id="totalPnlPct">--</div></div>
    <div class="kpi"><div class="label">总成本</div><div class="value" id="totalCost">--</div><div class="meta">投入本金</div></div>
  </div>

  <!-- Sectors -->
  <div class="sectors" id="sectorGrid"></div>

  <!-- Table -->
  <div class="panel">
    <div class="panel-head">
      <h2>持仓明细 <span class="badge" id="countBadge" style="margin-left:8px">--</span></h2>
      <div class="tabs" id="tabBar"></div>
    </div>
    <div style="overflow-x:auto">
      <table><thead><tr><th>饰品</th><th>磨损</th><th class="text-r">成本</th><th class="text-r">现价</th><th class="text-r">盈亏</th><th class="text-r">盈亏%</th></tr></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="chart-box wide" id="klineBox">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:baseline;gap:10px">
          <h3 id="klineTitle" style="margin:0">日K线</h3>
          <span id="klineName" style="font-size:13px;font-weight:700;color:var(--text)"></span>
          <span id="klinePrice" style="font-size:15px;font-weight:900;font-family:'DM Mono',monospace"></span>
          <span id="klineChg" style="font-size:12px;font-weight:700;font-family:'DM Mono',monospace"></span>
        </div>
        <div id="klinePeriod" style="display:flex;gap:4px">
          <button class="tab on" data-type="2">日K</button>
          <button class="tab" data-type="3">周K</button>
          <button class="tab" data-type="1">时K</button>
        </div>
      </div>
      <div id="klineChart" style="height:420px"></div>
    </div>
    <div class="chart-box"><h3>品类分布</h3><canvas id="doughnut"></canvas></div>
    <div class="chart-box"><h3>品类对比</h3><canvas id="bar"></canvas></div>
  </div>

  <div class="foot">数据来源: SteamDT API · GitHub Pages</div>
</div>

<script>
// ═══════════════ DATA ═══════════════
let H = [];

// Category mapping
const CAT_MAP = {'武器':'weapon','印花':'sticker','音乐':'music','agent':'agent'};
const CAT_META = {
  weapon:{color:'#3b82f6',label:'武器'},
  sticker:{color:'#f59e0b',label:'印花'},
  music:{color:'#06b6d4',label:'音乐'},
  agent:{color:'#8b5cf6',label:'角色'}
};

// Load holdings
async function loadHoldings() {
  try {
    const r = await fetch('holdings.json');
    const D = await r.json();
    H = D.items.map(item => {
      const t = CAT_MAP[item.category] || 'weapon';
      const w = item.wear ? item.wear.replace('崭新','FN').replace('略有磨损','FT').replace('久经沙场','FT').replace('略有磨损','FT').replace('受损','WW').replace('战痕累累','BS') : '';
      const q = item.qty || 1;
      const cost = item.costs ? item.costs.reduce((a,b)=>a+b,0) : item.cost * q;
      return {n:item.name,w:w,t:t,q:q,c:cost,p:item.price*q,pnl:item.price*q-cost,pnlPct:cost>0?(item.price*q-cost)/cost*100:0};
    });
  } catch(e) {
    console.error('Load failed',e);
    H = [
      {n:'MP7 死亡骷髅',w:'FT',t:'weapon',q:1,c:217,p:243.39,pnl:26.39,pnlPct:12.16},
      {n:'M4A4 都市DDPAT',w:'FN',t:'weapon',q:1,c:410,p:377.4,pnl:-32.6,pnlPct:-7.95}
    ];
  }
  initDashboard();
}

function initDashboard() {
  // Summary
  const tc = H.reduce((s,h)=>s+h.c,0);
  const tp = H.reduce((s,h)=>s+h.p,0);
  const tpct = tc > 0 ? (tp-tc)/tc*100 : 0;
  document.getElementById('totalValue').textContent = '¥' + tp.toLocaleString();
  document.getElementById('totalValue').className = 'value ' + (tp>=tc?'rise':'fall');
  document.getElementById('totalPnl').textContent = (tp>=tc?'+':'') + '¥' + (tp-tc).toLocaleString();
  document.getElementById('totalPnl').className = 'value ' + (tp>=tc?'rise':'fall');
  document.getElementById('totalPnlPct').textContent = (tp>=tc?'+':'') + tpct.toFixed(2) + '% · ' + Math.round(H.filter(h=>h.pnl>0).length/H.length*100) + '% 胜率';
  document.getElementById('totalCost').textContent = '¥' + tc.toLocaleString();
  document.getElementById('totalCount').textContent = H.length + ' 件';

  // Sectors
  const sg = document.getElementById('sectorGrid');
  Object.keys(CAT_META).forEach(key => {
    const items = H.filter(h=>h.t===key);
    const s = items.reduce((ss,hh)=>({c:ss.c+hh.c,p:ss.p+hh.p}),{c:0,p:0});
    const pnl = s.p - s.c;
    const pnlPct = s.c > 0 ? pnl/s.c*100 : 0;
    sg.innerHTML += '<div class="sector"><div class="head"><span class="name">'+CAT_META[key].label+'</span><span class="count">'+items.length+'</span></div><div class="pnl '+(pnl>=0?'clr-rise':'clr-fall')+'">'+(pnl>=0?'+':'')+'¥'+pnl.toLocaleString()+'</div><div class="detail">成本 ¥'+s.c.toLocaleString()+' · '+(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%</div><div class="bar"><div class="bar-fill '+(pnl>=0?'bar-rise':'bar-fall')+'" style="width:'+Math.min(Math.abs(pnlPct),100)+'%"></div></div></div>';
  });

  // Tabs
  const cats = [
    {key:'all',label:'全部'},
    {key:'weapon',label:'武器'},
    {key:'sticker',label:'印花'},
    {key:'music',label:'音乐'},
    {key:'agent',label:'角色'}
  ];
  let curCat = 'all';
  const tb = document.getElementById('tabBar');
  cats.forEach(c => {
    const cnt = c.key==='all' ? H.length : H.filter(h=>h.t===c.key).length;
    tb.innerHTML += '<button class="tab '+(c.key==='all'?'on':'')+'" data-cat="'+c.key+'">'+c.label+' '+cnt+'</button>';
  });
  tb.onclick = e => {
    if(e.target.classList.contains('tab')){
      tb.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
      e.target.classList.add('on');
      curCat = e.target.dataset.cat;
      render();
    }
  };

  function render(){
    const items = curCat==='all' ? H : H.filter(h=>h.t===curCat);
    document.getElementById('countBadge').textContent = items.length;
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = items.map(h => {
      const pnlCls = h.pnl>=0?'clr-rise':'clr-fall';
      return '<tr><td><div class="item-name">'+h.n+(h.q>1?'<span class="wear-tag">x'+h.q+'</span>':'')+'</div></td><td><span class="wear-tag">'+h.w+'</span></td><td class="text-r mono">¥'+h.c.toLocaleString()+'</td><td class="text-r mono">¥'+h.p.toLocaleString()+'</td><td class="text-r"><span class="'+pnlCls+'" style="font-weight:700">'+(h.pnl>=0?'+':'')+'¥'+h.pnl.toLocaleString()+'</span></td><td class="text-r"><span class="'+pnlCls+'">'+(h.pnlPct>=0?'+':'')+h.pnlPct.toFixed(1)+'%</span></td></tr>';
    }).join('');
  }
  render();

  // Charts
  const chartFont = {color:'#52525b',family:"'DM Mono',sans-serif"};
  Chart.defaults.color = '#52525b';
  Chart.defaults.font.family = chartFont.family;

  // Doughnut
  new Chart(document.getElementById('doughnut'),{
    type:'doughnut',
    data:{
      labels:Object.values(CAT_META).map(m=>m.label),
      datasets:[{
        data:Object.keys(CAT_META).map(k=>H.filter(h=>h.t===k).reduce((s,h)=>s+h.c,0)),
        backgroundColor:Object.values(CAT_META).map(m=>m.color+'26'),
        borderColor:Object.values(CAT_META).map(m=>m.color),
        borderWidth:2
      }]
    },
    options:{cutout:'65%',plugins:{legend:{position:'right',labels:{padding:14}}}}
  });

  // Bar
  const bk = Object.keys(CAT_META);
  new Chart(document.getElementById('bar'),{
    type:'bar',
    data:{
      labels:bk.map(k=>CAT_META[k].label),
      datasets:[
        {label:'成本',data:bk.map(k=>H.filter(h=>h.t===k).reduce((s,h)=>s+h.c,0)),backgroundColor:'#3b82f633',borderColor:'#3b82f6',borderWidth:1},
        {label:'现价',data:bk.map(k=>H.filter(h=>h.t===k).reduce((s,h)=>s+h.p,0)),backgroundColor:bk.map(k=>{const s=H.filter(h=>h.t===k).reduce((ss,hh)=>({c:ss.c+hh.c,p:ss.p+hh.p}),{c:0,p:0});return s.p>=s.c?'#ef444433':'#22c55e33'}),borderColor:bk.map(k=>{const s=H.filter(h=>h.t===k).reduce((ss,hh)=>({c:ss.c+hh.c,p:ss.p+hh.p}),{c:0,p:0});return s.p>=s.c?'#ef4444':'#22c55e'}),borderWidth:1}
      ]
    },
    options:{responsive:true,scales:{x:{grid:{display:false}},y:{grid:{color:'#1e2130'}}}}
  });
}

// ═══════════════ MARKET INDEX ═══════════════
(async function loadMarket(){
  try{
    const r = await fetch('market.json');
    const D = await r.json();
    if(D.update_time){
      document.getElementById('updateTime').textContent = new Date(D.update_time).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
    }
    renderMarket(D);
  }catch(e){
    console.warn('market.json load failed',e);
    document.getElementById('marketSection').style.display = 'none';
  }
})();

function renderMarket(D){
  const idx = D.index;
  const clr = idx.change >= 0 ? 'var(--rise)' : 'var(--fall)';
  document.getElementById('miNum').textContent = idx.latest.toFixed(2);
  document.getElementById('miNum').style.color = clr;
  document.getElementById('miChg').textContent = (idx.change>=0?'+':'') + idx.change.toFixed(2) + '%';
  document.getElementById('miChg').style.color = clr;

  // Index line chart
  const ec = echarts.init(document.getElementById('indexChart'),null,{renderer:'canvas'});
  ec.setOption({
    backgroundColor:'transparent',
    grid:{top:10,right:30,bottom:25,left:40},
    xAxis:{type:'category',data:idx.dates,axisLine:{lineStyle:{color:'#252a36'}},axisLabel:{color:'#52525b',fontSize:9,interval:6},axisTick:{show:false}},
    yAxis:{type:'value',min:Math.floor(idx.min*0.995),max:Math.ceil(idx.max*1.005),splitLine:{lineStyle:{color:'#1e2130'}},axisLabel:{color:'#52525b',fontSize:9}},
    tooltip:{trigger:'axis',backgroundColor:'#1a1e28',borderColor:'#252a36',textStyle:{color:'#e4e4e7',fontSize:11}},
    series:[{type:'line',data:idx.values,symbol:'none',lineStyle:{color:'#3b82f6',width:2},areaStyle:{color:'#3b82f614'}}]
  });

  // K-line
  const itemNames = Object.keys(D.items);
  const defaultItem = itemNames[0];
  const klEc = echarts.init(document.getElementById('klineChart'),null,{renderer:'canvas'});

  function renderKline(name){
    const item = D.items[name];
    if(!item) return;
    const kl = item.kline;
    const name_cn = item.name_cn || name;
    const latest = item.latest;
    const chg = item.change;
    const chgStr = (chg>=0?'+':'') + chg.toFixed(2) + '%';
    const clr = chg>=0 ? 'var(--rise)' : 'var(--fall)';

    // Update title bar
    document.getElementById('klineName').textContent = name_cn;
    document.getElementById('klinePrice').textContent = '\u00a5' + latest.toFixed(2);
    document.getElementById('klineChg').textContent = chgStr;
    document.getElementById('klineChg').style.color = clr;
    document.getElementById('klineChg').style.display = 'inline';

    const dates = kl.map(k=>{var d=new Date(k[0]*1000);return(d.getMonth()+1)+'-'+d.getDate()});
    
    // Close price at index 4; calculate MAs without placeholder dashes
    const closes = kl.map(k=>k[4]);
    const ma5=[], ma10=[], ma20=[], volumes=[], volColors=[];
    for(let i=0;i<kl.length;i++){
      const v = kl[i][5]||0;
      volumes.push(v);
      // Volume color: green if close >= open, red if close < open
      volColors.push(kl[i][4]>=kl[i][1]?'#22c55e':'#ef4444');
      const c = closes[i];
      if(i<4)      ma5.push('-'),  ma10.push('-'),  ma20.push('-');
      else if(i<9) ma10.push('-'), ma20.push('-'),  ma5.push(closes.slice(i-4,i+1).reduce((a,b)=>a+b,0)/5);
      else if(i<19)ma20.push('-'),  ma10.push(closes.slice(i-9,i+1).reduce((a,b)=>a+b,0)/10),
                     ma5.push(closes.slice(i-4,i+1).reduce((a,b)=>a+b,0)/5);
      else {
        ma5.push(closes.slice(i-4,i+1).reduce((a,b)=>a+b,0)/5);
        ma10.push(closes.slice(i-9,i+1).reduce((a,b)=>a+b,0)/10);
        ma20.push(closes.slice(i-19,i+1).reduce((a,b)=>a+b,0)/20);
      }
    }
    
    klEc.setOption({
      backgroundColor:'transparent',
      grid:[
        {top:12,right:60,bottom:26,left:60},
        {top:'76%',right:60,bottom:26,left:60}
      ],
      xAxis:[
        {type:'category',data:dates,gridIndex:0,boundaryGap:true,
          axisLine:{lineStyle:{color:'#252a36'}},axisLabel:{show:false},axisTick:{show:false},
          splitLine:{show:false}},
        {type:'category',data:dates,gridIndex:1,boundaryGap:true,
          axisLine:{lineStyle:{color:'#252a36'}},axisLabel:{color:'#52525b',fontSize:9,interval:9},axisTick:{show:false}}
      ],
      yAxis:[
        {type:'value',gridIndex:0,scale:true,
          splitLine:{lineStyle:{color:'#1e2130'}},
          axisLabel:{color:'#52525b',fontSize:9,formatter:v=>'\u00a5'+v},
          markLine:{silent:true,lineStyle:{color:'#f59e0b66',type:'dashed'},symbol:['none','none'],
            data:[{yAxis:latest,name:'当前价'}]}},
        {type:'value',gridIndex:1,scale:true,
          splitLine:{show:false},
          axisLabel:{color:'#52525b',fontSize:9}}
      ],
      tooltip:{
        trigger:'axis',backgroundColor:'#1a1e28',borderColor:'#252a36',
        textStyle:{color:'#e4e4e7',fontSize:11},axisPointer:{type:'cross',crossStyle:{color:'#555'}},
        formatter:params=>{
          const d=params.find(p=>p.seriesType==='candlestick');
          if(!d)return'';
          const [o,h,l,c]=d.value;
          const dt=new Date(dates[d.dataIndex]);
          const dtStr=dt.getFullYear()+'-'+(dt.getMonth()+1)+'-'+dt.getDate();
          const maVals=params.filter(p=>p.seriesName.startsWith('MA'));
          const vol=params.find(p=>p.seriesName==='成交量');
          return`<div style="font-size:11px"><b>${dtStr}</b><br/>
\u5f00\u76d8 ${o}&nbsp;&nbsp;\u6536\u76d8 <b style="color:${c>=o?'#22c55e':'#ef4444'}">${c}</b><br/>
\u6700\u9ad8 ${h}&nbsp;&nbsp;\u6700\u4f4e ${l}<br/>`+
(c>=o?'<span style="color:#22c55e">\u25b2</span>':'<span style="color:#ef4444">\u25bc</span>')+
`${((c-o)/o*100).toFixed(2)}%`+
(maVals.length?`<br/>`+maVals.map(m=>`${m.seriesName}: ${m.value}`).join('<br/>'):'')+
(vol?`<br/>\u6210\u4ea4\u91cf: ${(vol.value/1000).toFixed(1)}K`:'')+`</div>`;
        }
      },
      series:[
        {type:'candlestick',name:'K线',data:kl.map(k=>[k[1],k[2],k[3],k[4]]),
          xAxisIndex:0,yAxisIndex:0,
          itemStyle:{color:'#22c55e',color0:'#ef4444',borderColor:'#22c55e',borderColor0:'#ef4444',borderWidth:1}},
        {type:'line',name:'MA5', data:ma5, xAxisIndex:0,yAxisIndex:0,symbol:'none',smooth:true,
          lineStyle:{color:'#f59e0b',width:1.5},showSymbol:false},
        {type:'line',name:'MA10',data:ma10,xAxisIndex:0,yAxisIndex:0,symbol:'none',smooth:true,
          lineStyle:{color:'#3b82f6',width:1.5},showSymbol:false},
        {type:'line',name:'MA20',data:ma20,xAxisIndex:0,yAxisIndex:0,symbol:'none',smooth:true,
          lineStyle:{color:'#a855f7',width:1.5},showSymbol:false},
        {type:'bar',name:'成交量',data:volumes,xAxisIndex:1,yAxisIndex:1,
          itemStyle:{color:volColors}}
      ],
      legend:{show:true,top:0,textStyle:{color:'#52525b',fontSize:10}}
    },true);
  }

  // K-line item buttons
  const mi = document.getElementById('miItems');
  itemNames.forEach((name,i)=>{
    const item = D.items[name];
    const chg = item.change;
    const name_cn = item.name_cn || name;
    mi.innerHTML += '<div class="mi-item '+(i===0?'active':'')+'" data-name="'+name+'"><div class="mi-item-name" title="'+name+'">'+name_cn+'</div><div class="mi-item-price">&yen;'+item.latest.toFixed(1)+'</div><div class="mi-item-chg '+(chg>=0?'clr-up':'clr-dn')+'">'+(chg>=0?'+':'')+chg.toFixed(2)+'%</div></div>';
  });
  mi.onclick = e => {
    var card = e.target.closest('.mi-item');
    if(!card) return;
    mi.querySelectorAll('.mi-item').forEach(c=>c.classList.remove('active'));
    card.classList.add('active');
    renderKline(card.dataset.name);
  };

  // Period tab switching (visual only - daily K-line loads by default)
  document.querySelectorAll('#klinePeriod .tab').forEach(btn=>{
    btn.onclick = () => {
      document.querySelectorAll('#klinePeriod .tab').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
    };
  });

  window.onresize = function(){ec.resize();klEc.resize();};
  renderKline(defaultItem);
}

// Start
loadHoldings();
</script>
</body>
</html>
