<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>CS2 饰品投资看板 · v2026.04.10b</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;--border:#252a36;--text:#e4e4e7;--text2:#a1a1aa;--text3:#52525b;--rise:#ef4444;--fall:#22c55e;--blue:#3b82f6}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:1280px;margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.header h1{font-size:24px;font-weight:900}
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px}
.kpi{background:var(--surface);padding:20px}
.kpi .label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.kpi .value{font-size:28px;font-weight:900}
.kpi .value.rise{color:var(--rise)}
.kpi .value.fall{color:var(--fall)}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
tbody td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px}
tbody tr:hover{background:rgba(59,130,246,.03)}
.item-name{font-weight:600}
.wear-tag{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 6px;border-radius:4px;margin-left:8px}
.text-r{text-align:right}
.clr-rise{color:var(--rise)}.clr-fall{color:var(--fall)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CS2 饰品投资看板 <span style="font-size:14px;color:var(--text3)">v2026.04.10b</span></h1>
    <button onclick="location.reload()" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:6px;cursor:pointer">刷新</button>
  </div>
  <div class="kpi-strip">
    <div class="kpi"><div class="label">总价值</div><div class="value" id="totalValue">--</div></div>
    <div class="kpi"><div class="label">总盈亏</div><div class="value" id="totalPnl">--</div></div>
    <div class="kpi"><div class="label">持仓数</div><div class="value" id="totalCount">--</div></div>
  </div>
  <table>
    <thead><tr><th>饰品</th><th>磨损</th><th class="text-r">成本</th><th class="text-r">现价</th><th class="text-r">盈亏</th><th class="text-r">盈亏%</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<script>
let holdings = [];
async function loadData() {
  try {
    const r = await fetch('holdings.json');
    const D = await r.json();
    holdings = D.items.map(item => ({
      name: item.name,
      wear: item.wear || '-',
      cost: (item.costs || [item.cost]).reduce((a,b)=>a+b,0),
      price: item.price * (item.qty || 1),
      qty: item.qty || 1
    }));
  } catch(e) {
    console.error('Load failed', e);
    holdings = [
      {name:'MP7 死亡骷髅',wear:'FT',cost:217,price:243.39,qty:1},
      {name:'M4A4 都市DDPAT',wear:'FN',cost:410,price:377.4,qty:1}
    ];
  }
  render();
}
function render() {
  const totalValue = holdings.reduce((s,h)=>s+h.price,0);
  const totalCost = holdings.reduce((s,h)=>s+h.cost,0);
  const totalPnl = totalValue - totalCost;
  const pnlPct = totalCost > 0 ? (totalPnl/totalCost*100) : 0;
  
  document.getElementById('totalValue').textContent = '¥' + totalValue.toLocaleString();
  document.getElementById('totalPnl').textContent = (totalPnl>=0?'+':'') + '¥' + totalPnl.toLocaleString();
  document.getElementById('totalPnl').className = 'value ' + (totalPnl>=0?'rise':'fall');
  document.getElementById('totalCount').textContent = holdings.length;
  
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = holdings.map(h => {
    const pnl = h.price - h.cost;
    const pnlPct = h.cost > 0 ? (pnl/h.cost*100) : 0;
    const pnlCls = pnl>=0?'clr-rise':'clr-fall';
    return '<tr><td class="item-name">'+h.name+(h.qty>1?'<span class="wear-tag">x'+h.qty+'</span>':'')+'</td><td><span class="wear-tag">'+h.wear+'</span></td><td class="text-r">¥'+h.cost.toLocaleString()+'</td><td class="text-r">¥'+h.price.toLocaleString()+'</td><td class="text-r '+pnlCls+'">'+(pnl>=0?'+':'')+'¥'+pnl.toLocaleString()+'</td><td class="text-r '+pnlCls+'">'+(pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%</td></tr>';
  }).join('');
}
loadData();
</script>
</body>
</html>
