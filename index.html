<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS2 饰品投资看板 · hintime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0a0c10;--surface:#12151c;--surface2:#1a1e28;--border:#252a36;
  --text:#e4e4e7;--text2:#a1a1aa;--text3:#52525b;
  --rise:#ef4444;--fall:#22c55e;--flat:#71717a;
  --blue:#3b82f6;--amber:#f59e0b;--violet:#8b5cf6;--cyan:#06b6d4;
  --rise-bg:rgba(239,68,68,.08);--fall-bg:rgba(34,197,94,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC','PingFang SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.mono{font-family:'DM Mono','Cascadia Code',monospace}

/* ── grain overlay ── */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ── top glow ── */
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;
  background:radial-gradient(ellipse,rgba(59,130,246,.07) 0%,transparent 70%);pointer-events:none;z-index:0}

.container{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:24px 20px 60px}

/* ── header ── */
.header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.header-left h1{font-size:24px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#e4e4e7 40%,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-left .sub{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:.5px}
.header-right{display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:20px}
.badge .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── refresh button ── */
.refresh-btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:11px;font-family:inherit;font-weight:500;padding:6px 16px;border-radius:20px;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.refresh-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.06)}
.refresh-btn:active{transform:scale(.96)}
.refresh-btn svg{width:13px;height:13px;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.refresh-btn.spinning svg{transform:rotate(360deg)}
.refresh-btn .last-update{font-size:9px;color:var(--text3);margin-left:2px}

/* ── KPI strip ── */
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:28px}
.kpi{background:var(--surface);padding:20px 24px;position:relative}
.kpi .label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:500;margin-bottom:8px}
.kpi .value{font-size:26px;font-weight:900;line-height:1}
.kpi .meta{font-size:11px;color:var(--text3);margin-top:6px}
.kpi .value.rise{color:var(--rise)}
.kpi .value.fall{color:var(--fall)}
.kpi .arrow{position:absolute;top:50%;right:20px;transform:translateY(-50%);font-size:32px;opacity:.06;font-weight:900}

/* ── sector cards ── */
.sectors{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.sector{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;transition:border-color .2s}
.sector:hover{border-color:var(--blue)}
.sector .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sector .head .name{font-size:12px;font-weight:700;color:var(--text2)}
.sector .head .count{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px}
.sector .pnl{font-size:18px;font-weight:900}
.sector .detail{font-size:10px;color:var(--text3);margin-top:4px}
.sector .bar{height:3px;background:var(--surface2);border-radius:2px;margin-top:8px;overflow:hidden}
.sector .bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
.bar-rise{background:var(--rise)}
.bar-fall{background:var(--fall)}

/* ── tabs + table ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.panel-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.panel-head h2{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.5px}
.tabs{display:flex;gap:4px}
.tab{background:none;border:1px solid transparent;color:var(--text3);padding:4px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;font-family:inherit}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--blue);background:rgba(59,130,246,.08);border-color:rgba(59,130,246,.2)}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;padding:10px 16px;background:var(--surface);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border)}
tbody td{padding:10px 16px;border-bottom:1px solid rgba(37,42,54,.5);font-size:13px;vertical-align:middle}
tbody tr{transition:background .1s}
tbody tr:hover{background:rgba(59,130,246,.03)}
tbody tr:last-child td{border-bottom:none}

.item-name{font-weight:600;color:var(--text);font-size:13px}
.item-sub{font-size:10px;color:var(--text3);margin-top:2px}
.wear-tag{font-size:10px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace}
.qty-tag{font-size:10px;color:var(--blue);margin-left:6px;font-family:'DM Mono',monospace}
.text-r{text-align:right}
.text-mono{font-family:'DM Mono',monospace}
.clr-rise{color:var(--rise)}.clr-fall{color:var(--fall)}.clr-flat{color:var(--flat)}
.bg-rise{background:var(--rise-bg)}.bg-fall{background:var(--fall-bg)}

/* ── pnl sparkline ── */
.pnl-bar{display:inline-block;width:60px;height:4px;border-radius:2px;background:var(--surface2);overflow:hidden;vertical-align:middle;margin-left:8px}
.pnl-bar-fill{height:100%;border-radius:2px}

/* ── charts grid ── */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.chart-box h3{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:16px}
.chart-box.wide{grid-column:span 2}

/* ── footer ── */
.foot{font-size:10px;color:var(--text3);text-align:center;padding:20px;letter-spacing:.5px}
.foot a{color:var(--blue);text-decoration:none}

/* ── mobile ── */
@media(max-width:900px){
  .kpi-strip{grid-template-columns:1fr}
  .sectors{grid-template-columns:1fr 1fr}
  .charts{grid-template-columns:1fr}
  .chart-box.wide{grid-column:span 1}
  .header h1{font-size:20px}
  .kpi .value{font-size:22px}
  .panel-head{flex-direction:column;align-items:flex-start}
}
@media(max-width:520px){
  .sectors{grid-template-columns:1fr}
  .container{padding:16px 12px 40px}
}

/* ── entrance animation ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .5s ease both}
.anim-d1{animation-delay:.05s}.anim-d2{animation-delay:.1s}.anim-d3{animation-delay:.15s}
.anim-d4{animation-delay:.2s}.anim-d5{animation-delay:.25s}

/* ── sort indicator ── */
.sort-btn{cursor:pointer;user-select:none}
.sort-btn:hover{color:var(--text2)}
.sort-arrow{font-size:8px;margin-left:4px;opacity:.5}
.sort-arrow.active{opacity:1;color:var(--blue)}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header anim">
    <div class="header-left">
      <h1>CS2 饰品投资看板</h1>
      <div class="sub">悠悠有品持仓成本基准 · SteamDT 实时数据 · <span style="color:var(--rise)">红</span>涨<span style="color:var(--fall)">绿</span>跌（A股惯例）</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" title="刷新数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/><path d="M2.5 12A10 10 0 0 1 19.05 3.5"/><path d="M21.5 12A10 10 0 0 1 4.95 20.5"/></svg>
        刷新
      </button>
      <span class="badge"><span class="dot"></span>悠悠有品</span>
      <span class="badge">2026-04-08</span>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-strip anim anim-d1">
    <div class="kpi">
      <div class="label">持仓市值</div>
      <div class="value" id="kpiValue">--</div>
      <div class="meta" id="kpiCount">-- 件藏品</div>
      <div class="arrow">¥</div>
    </div>
    <div class="kpi">
      <div class="label">综合浮盈亏</div>
      <div class="value" id="kpiPnl">--</div>
      <div class="meta" id="kpiPnlPct">--</div>
      <div class="arrow" id="kpiArrow">→</div>
    </div>
    <div class="kpi">
      <div class="label">持仓成本</div>
      <div class="value" id="kpiCost">--</div>
      <div class="meta">悠悠有品购入价</div>
      <div class="arrow">∑</div>
    </div>
  </div>

  <!-- Sectors -->
  <div class="sectors anim anim-d2" id="sectorGrid"></div>

  <!-- Table -->
  <div class="panel anim anim-d3">
    <div class="panel-head">
      <h2>持仓明细 <span class="badge" id="countBadge" style="margin-left:8px">--</span></h2>
      <div class="tabs" id="tabBar"></div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th class="sort-btn" data-sort="name">品名 <span class="sort-arrow" id="sort-name">↕</span></th>
            <th>品质</th>
            <th class="sort-btn text-r" data-sort="cost">成本 <span class="sort-arrow" id="sort-cost">↕</span></th>
            <th class="sort-btn text-r" data-sort="price">现价 <span class="sort-arrow" id="sort-price">↕</span></th>
            <th class="sort-btn text-r" data-sort="pnl">浮盈亏 <span class="sort-arrow" id="sort-pnl">↕</span></th>
            <th class="sort-btn text-r" data-sort="pnlPct">收益率 <span class="sort-arrow" id="sort-pnlPct">↕</span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts anim anim-d4">
    <div class="chart-box"><h3>成本结构</h3><canvas id="doughnut"></canvas></div>
    <div class="chart-box"><h3>板块盈亏对比</h3><canvas id="bar"></canvas></div>
    <div class="chart-box wide"><h3>Top 15 持仓 · 成本 vs 现值</h3><canvas id="top15"></canvas></div>
  </div>

  <div class="foot anim anim-d5">
    数据来源：悠悠有品后台 CDP 抓取（2026-04-07）· SteamDT 参考价 · GitHub Pages 部署
  </div>
</div>

<script>
// ═══════════════ DATA ═══════════════
const H = [
  {n:'M4A1消音版 · 苔藓石英',w:'FN',wv:.0563,c:1610,p:1319,t:'weapon'},
  {n:'P2000 · 火灵',w:'FN',wv:.0607,c:1340,p:1388.5,t:'weapon'},
  {n:'M4A4 · 炼狱之火',w:'FT',wv:.1456,c:744,p:676.96,t:'weapon'},
  {n:'法玛斯 · 纪念碑',w:'FN',wv:.0347,c:710,p:648.9,t:'weapon'},
  {n:'法玛斯 · 纪念碑',w:'FN',wv:.0435,c:702,p:648.9,t:'weapon'},
  {n:'UMP-45 · 炽烈之炎',w:'FN',wv:.0633,c:390,p:323,t:'weapon'},
  {n:'UMP-45 · 炽烈之炎',w:'FN',wv:.0341,c:370,p:323,t:'weapon'},
  {n:'M4A4 · 都市 DDPAT',w:'FN',wv:.0649,c:410,p:377.4,t:'weapon'},
  {n:'MP7 · 死亡骷髅',w:'FT',wv:.1146,c:217,p:243.39,t:'weapon'},
  {n:'M4A4 · 龙王',w:'FT',wv:.1403,c:184,p:196.5,t:'weapon'},
  {n:'法玛斯 · 线路故障',w:'FN',wv:.0587,c:115.5,p:131,t:'weapon'},
  {n:'FN57 · 夜影',w:'FN',wv:.0576,c:140,p:135.5,t:'weapon'},
  {n:'M4A4 · 多边形编辑',w:'FT',wv:.1440,c:132,p:150,t:'weapon'},
  {n:'M4A4 · 多边形编辑',w:'FT',wv:.1376,c:129,p:150,t:'weapon'},
  {n:'M4A4 · 彼岸花',w:'FT',wv:.1411,c:127,p:134.99,t:'weapon'},
  {n:'双持贝瑞塔 · 街头抢匪',w:'FN',wv:.0585,c:54.9,p:50.78,t:'weapon'},
  {n:'M4A4 · 蚀刻领主',w:'FT',wv:.1215,c:7.65,p:8.92,t:'weapon'},

  {n:'海军上尉里克索尔',w:'大师',wv:0,c:377,p:250,t:'agent'},
  {n:'海军上尉里克索尔',w:'大师',wv:0,c:350,p:250,t:'agent'},
  {n:'海军上尉里克索尔',w:'大师',wv:0,c:317,p:250,t:'agent'},
  {n:'"蓝莓" 铅弹',w:'卓越',wv:0,c:213,p:168,t:'agent'},
  {n:'"蓝莓" 铅弹',w:'卓越',wv:0,c:189,p:168,t:'agent'},
  {n:'"蓝莓" 铅弹',w:'卓越',wv:0,c:189,p:168,t:'agent'},
  {n:'沙哈马特教授 · 精英分子',w:'非凡',wv:0,c:79,p:69.9,t:'agent'},
  {n:'沙哈马特教授 · 精英分子',w:'非凡',wv:0,c:72,p:69.9,t:'agent'},
  {n:'沙哈马特教授 · 精英分子',w:'非凡',wv:0,c:70,p:69.9,t:'agent'},
  {n:'沙哈马特教授 · 精英分子',w:'非凡',wv:0,c:66,p:69.9,t:'agent'},
  {n:'沙哈马特教授 · 精英分子',w:'非凡',wv:0,c:62.8,p:69.9,t:'agent'},

  {n:'NAVI · 2024上海（全息）',w:'Holo',wv:0,c:51,p:31.8,q:3,t:'sticker'},
  {n:'FaZe Clan · 2024上海（全息）',w:'Holo',wv:0,c:49,p:41.9,q:6,t:'sticker'},
  {n:'paiN Gaming · 2021斯德哥尔摩（全息）',w:'Holo',wv:0,c:103,p:79.57,q:1,t:'sticker'},
  {n:'NAVI · 2021斯德哥尔摩（全息）',w:'Holo',wv:0,c:41.5,p:37.4,q:2,t:'sticker'},
  {n:'HEROIC · 2024上海（全息）',w:'Holo',wv:0,c:30.5,p:39.99,q:4,t:'sticker'},
  {n:'EG · 2021斯德哥尔摩（全息）',w:'Holo',wv:0,c:61,p:52.8,q:1,t:'sticker'},
  {n:'NiP · 2021斯德哥尔摩（全息）',w:'Holo',wv:0,c:46.5,p:42.3,q:1,t:'sticker'},
  {n:'MIBR · 2025布达佩斯（全息）',w:'Holo',wv:0,c:31,p:26.78,q:1,t:'sticker'},
  {n:'GamerLegion · 2025布达佩斯（全息）',w:'Holo',wv:0,c:30,p:27.7,q:2,t:'sticker'},
  {n:'Fnatic · 2025布达佩斯（全息）',w:'Holo',wv:0,c:28.4,p:29.7,q:2,t:'sticker'},
  {n:'GamerLegion · 2025布达佩斯（全息）',w:'Holo',wv:0,c:27.6,p:27.7,q:1,t:'sticker'},
  {n:'Complexity · 2022安特卫普（全息）',w:'Holo',wv:0,c:49.8,p:50,q:1,t:'sticker'},
  {n:'iM · 2024上海',w:'普通',wv:0,c:.02,p:.02,q:1,t:'sticker'},

  {n:'DRYDEN · 触摸能量',w:'高级',wv:0,c:10.78,p:11.2,q:1,t:'music'},
];

// derive
H.forEach(h=>{
  const q=h.q||1;
  h.totalCost=h.c*q; h.totalPrice=h.p*q;
  h.pnl=h.totalPrice-h.totalCost;
  h.pnlPct=h.totalCost>0?(h.pnl/h.totalCost*100):0;
  h.wearStr=h.wv>0?h.wv.toFixed(4):'';
  h.qtyStr=q>1?`×${q}`:'';
});

// ═══════════════ CATEGORIES ═══════════════
const CATS=[
  {key:'all',label:'全部',icon:'📊'},
  {key:'weapon',label:'武器',icon:'🔫'},
  {key:'agent',label:'角色手套',icon:'🎭'},
  {key:'sticker',label:'印花',icon:'🏷️'},
  {key:'music',label:'音乐盒',icon:'🎵'},
];

const CAT_META={
  weapon:{color:'var(--blue)',hex:'#3b82f6',label:'武器'},
  agent:{color:'var(--violet)',hex:'#8b5cf6',label:'角色手套'},
  sticker:{color:'var(--amber)',hex:'#f59e0b',label:'印花'},
  music:{color:'var(--cyan)',hex:'#06b6d4',label:'音乐盒'},
};

function summarize(items){
  const tc=items.reduce((s,h)=>s+h.totalCost,0);
  const tp=items.reduce((s,h)=>s+h.totalPrice,0);
  return{cost:tc,value:tp,pnl:tp-tc,pnlPct:tc>0?((tp-tc)/tc*100):0,count:items.length,
    wins:items.filter(h=>h.pnl>0).length,
    maxPnl:items.reduce((m,h)=>h.pnl>m.pnl?h:m,{pnl:-Infinity}),
    maxLoss:items.reduce((m,h)=>h.pnl<m.pnl?h:m,{pnl:Infinity})};
}

const allSummary=summarize(H);

// ═══════════════ KPI ═══════════════
const fmt=v=>'¥'+v.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI=v=>'¥'+v.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});

document.getElementById('kpiValue').textContent=fmtI(allSummary.value);
document.getElementById('kpiCount').textContent=H.length+' 件藏品';

const kpiPnlEl=document.getElementById('kpiPnl');
kpiPnlEl.textContent=(allSummary.pnl>=0?'+':'')+fmtI(allSummary.pnl);
kpiPnlEl.className='value '+(allSummary.pnl>0?'rise':allSummary.pnl<0?'fall':'');

document.getElementById('kpiPnlPct').textContent=
  `${allSummary.pnl>=0?'+':''}${allSummary.pnlPct.toFixed(2)}% · 胜率 ${Math.round(allSummary.wins/H.length*100)}%`;
document.getElementById('kpiArrow').textContent=allSummary.pnl>=0?'▲':'▼';
document.getElementById('kpiArrow').style.color=allSummary.pnl>=0?'var(--rise)':'var(--fall)';
document.getElementById('kpiCost').textContent=fmtI(allSummary.cost);

// ═══════════════ SECTORS ═══════════════
const sectorGrid=document.getElementById('sectorGrid');
Object.keys(CAT_META).forEach(key=>{
  const items=H.filter(h=>h.t===key);
  const s=summarize(items);
  const m=CAT_META[key];
  const pct=Math.abs(s.pnlPct);
  const maxPct=Math.max(15,pct);
  sectorGrid.innerHTML+=`
    <div class="sector">
      <div class="head"><span class="name">${m.label}</span><span class="count">${s.count}件</span></div>
      <div class="pnl ${s.pnl>=0?'clr-rise':'clr-fall'}">${s.pnl>=0?'+':''}${fmtI(s.pnl)}</div>
      <div class="detail">成本 ${fmtI(s.cost)} · ${s.pnl>=0?'+':''}${s.pnlPct.toFixed(1)}%</div>
      <div class="bar"><div class="bar-fill ${s.pnl>=0?'bar-rise':'bar-fall'}" style="width:${Math.min(pct/maxPct*100,100)}%"></div></div>
    </div>`;
});

// ═══════════════ TABS ═══════════════
let curCat='all',curSort=null,curDir=-1;

const tabBar=document.getElementById('tabBar');
CATS.forEach(c=>{
  const cnt=c.key==='all'?H.length:H.filter(h=>h.t===c.key).length;
  tabBar.innerHTML+=`<button class="tab ${c.key==='all'?'on':''}" data-cat="${c.key}">${c.icon} ${c.label} ${cnt}</button>`;
});
tabBar.addEventListener('click',e=>{
  if(!e.target.classList.contains('tab'))return;
  tabBar.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  e.target.classList.add('on');
  curCat=e.target.dataset.cat;
  render();
});

// ═══════════════ SORT ═══════════════
document.querySelectorAll('.sort-btn').forEach(th=>{
  th.addEventListener('click',()=>{
    const key=th.dataset.sort;
    if(curSort===key)curDir*=-1;else{curSort=key;curDir=key==='name'?1:-1;}
    render();
  });
});

// ═══════════════ RENDER ═══════════════
function render(){
  const items=curCat==='all'?[...H]:H.filter(h=>h.t===curCat);
  if(curSort){
    items.sort((a,b)=>{
      let va,vb;
      if(curSort==='name'){va=a.n;vb=b.n;return curDir*va.localeCompare(vb,'zh');}
      va=a[curSort];vb=b[curSort];
      return curDir*(va-vb);
    });
  }
  document.getElementById('countBadge').textContent=items.length+'件';

  const tbody=document.getElementById('tbody');
  tbody.innerHTML=items.map(h=>{
    const pc=h.pnl>0?'clr-rise':h.pnl<0?'clr-fall':'clr-flat';
    const sign=h.pnl>=0?'+':'';
    const wearInfo=h.wv>0?`<div class="item-sub mono">${h.wearStr}</div>`:'';
    return`<tr>
      <td>
        <div class="item-name">${h.n}${h.qtyStr?`<span class="qty-tag">${h.qtyStr}</span>`:''}</div>
        ${wearInfo}
      </td>
      <td><span class="wear-tag">${h.w}</span></td>
      <td class="text-r text-mono" style="color:var(--text3)">${fmt(h.totalCost)}</td>
      <td class="text-r text-mono" style="color:var(--text)">${fmt(h.totalPrice)}</td>
      <td class="text-r"><span class="${pc}" style="font-weight:700">${sign}${fmt(h.pnl)}</span></td>
      <td class="text-r"><span class="${pc}" style="font-weight:500">${sign}${h.pnlPct.toFixed(1)}%</span></td>
    </tr>`;
  }).join('');
}
render();

// ═══════════════ CHARTS ═══════════════
const chartFont={color:'#52525b',family:"'DM Mono','Noto Sans SC',sans-serif"};
Chart.defaults.color='#52525b';
Chart.defaults.font.family=chartFont.family;
Chart.defaults.font.size=11;

const gridColor='#1e2130';

// Doughnut
new Chart(document.getElementById('doughnut'),{
  type:'doughnut',
  data:{
    labels:Object.values(CAT_META).map(m=>m.label),
    datasets:[{
      data:Object.keys(CAT_META).map(k=>summarize(H.filter(h=>h.t===k)).cost),
      backgroundColor:['rgba(59,130,246,.15)','rgba(139,92,246,.15)','rgba(245,158,11,.15)','rgba(6,182,212,.15)'],
      borderColor:Object.values(CAT_META).map(m=>m.hex),
      borderWidth:2,hoverOffset:6
    }]
  },
  options:{responsive:true,cutout:'65%',
    plugins:{legend:{position:'right',labels:{padding:14,usePointStyle:true,pointStyleWidth:8,font:{size:11}}}}
  }
});

// Bar
const barKeys=Object.keys(CAT_META);
new Chart(document.getElementById('bar'),{
  type:'bar',
  data:{
    labels:barKeys.map(k=>CAT_META[k].label),
    datasets:[
      {label:'成本',data:barKeys.map(k=>summarize(H.filter(h=>h.t===k)).cost),
        backgroundColor:'rgba(59,130,246,.3)',borderColor:'#3b82f6',borderWidth:1,borderRadius:4},
      {label:'现值',data:barKeys.map(k=>summarize(H.filter(h=>h.t===k)).value),
        backgroundColor:barKeys.map(k=>{const s=summarize(H.filter(h=>h.t===k));return s.pnl>=0?'rgba(239,68,68,.3)':'rgba(34,197,94,.3)'}),
        borderColor:barKeys.map(k=>{const s=summarize(H.filter(h=>h.t===k));return s.pnl>=0?'#ef4444':'#22c55e'}),
        borderWidth:1,borderRadius:4}
    ]
  },
  options:{responsive:true,
    plugins:{legend:{labels:{usePointStyle:true,pointStyleWidth:8,font:{size:11}}}},
    scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:gridColor}}}}
});

// Top15
const top15=[...H].sort((a,b)=>b.totalCost-a.totalCost).slice(0,15);
new Chart(document.getElementById('top15'),{
  type:'bar',
  data:{
    labels:top15.map(h=>h.n.replace(/ · /,' ').slice(0,18)),
    datasets:[
      {label:'成本',data:top15.map(h=>h.totalCost),backgroundColor:'rgba(59,130,246,.35)',borderColor:'#3b82f6',borderWidth:1,borderRadius:3},
      {label:'现值',data:top15.map(h=>h.totalPrice),
        backgroundColor:top15.map(h=>h.pnl>=0?'rgba(239,68,68,.35)':'rgba(34,197,94,.35)'),
        borderColor:top15.map(h=>h.pnl>=0?'#ef4444':'#22c55e'),borderWidth:1,borderRadius:3}
    ]
  },
  options:{indexAxis:'y',responsive:true,
    plugins:{legend:{labels:{usePointStyle:true,pointStyleWidth:8,font:{size:10}}}},
    scales:{x:{ticks:{font:{size:9}},grid:{color:gridColor}},y:{ticks:{font:{size:9}},grid:{display:false}}}}
});

// ═══════════════ REFRESH ═══════════════
document.getElementById('refreshBtn').addEventListener('click',()=>{
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.querySelector('.container').style.opacity='.4';
  setTimeout(()=>location.reload(),500);
});
</script>
</body>
</html>
